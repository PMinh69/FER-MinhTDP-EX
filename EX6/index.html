<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Grid Exercise</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand text-muted" href="#">Navbar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link text-muted" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-muted" href="#">Link</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-muted" href="#">Dropdown</a>
            </li>
          </ul>
          <form class="d-flex border">
            <input
              class="form-control border-0 rounded-0"
              type="search"
              placeholder="Search"
            />
            <button
              class="btn btn-outline-primary border-0 rounded-0"
              type="submit"
            >
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container-fluid px-0 mb-5">
      <div class="carousel-placeholder">
        <a class="carousel-arrow arrow-left">&lsaquo;</a>
        1920 x 530
        <a class="carousel-arrow arrow-right">&rsaquo;</a>
        <div class="carousel-indicators-custom">
          <div class="indicator-dot"></div>
          <div class="indicator-dot active"></div>
          <div class="indicator-dot"></div>
        </div>
      </div>
    </div>

    <div class="container mb-5">
      <div class="row mb-3">
        <div class="col">
          <h3 class="text-uppercase text-secondary mb-0 fw-normal">
            New Product
          </h3>
          <small class="text-muted">List product description</small>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12 col-sm-6 col-md-3">
          <div class="card h-100">
            <div class="product-img-placeholder">280 x 280</div>
            <div class="card-body p-3">
              <h6 class="card-title text-muted fw-normal mb-1">Product</h6>
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <span class="old-price">100.000 vnd</span>
                <span class="new-price">80.000 vnd</span>
              </div>
              <button
                class="btn btn-action w-100 text-start p-0 d-flex align-items-center"
              >
                <i>🛒</i> <span class="ms-2">Xem chi tiết</span>
              </button>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <div class="card h-100">
            <div class="product-img-placeholder">280 x 280</div>
            <div class="card-body p-3">
              <h6 class="card-title text-muted fw-normal mb-1">Product</h6>
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <span class="old-price">100.000 vnd</span>
                <span class="new-price">80.000 vnd</span>
              </div>
              <button
                class="btn btn-action w-100 text-start p-0 d-flex align-items-center"
              >
                <i>🛒</i> <span class="ms-2">Xem chi tiết</span>
              </button>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <div class="card h-100">
            <div class="product-img-placeholder">280 x 280</div>
            <div class="card-body p-3">
              <h6 class="card-title text-muted fw-normal mb-1">Product</h6>
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <span class="old-price">100.000 vnd</span>
                <span class="new-price">80.000 vnd</span>
              </div>
              <button
                class="btn btn-action w-100 text-start p-0 d-flex align-items-center"
              >
                <i>🛒</i> <span class="ms-2">Xem chi tiết</span>
              </button>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <div class="card h-100">
            <div class="sale-badge">Sale</div>
            <div class="product-img-placeholder">280 x 280</div>
            <div class="card-body p-3">
              <h6 class="card-title text-muted fw-normal mb-1">Product</h6>
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <span class="old-price">100.000 vnd</span>
                <span class="new-price">80.000 vnd</span>
              </div>
              <button
                class="btn btn-action w-100 text-start p-0 d-flex align-items-center"
              >
                <i>🛒</i> <span class="ms-2">Xem chi tiết</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
