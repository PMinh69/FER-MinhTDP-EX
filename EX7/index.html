<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Cards Column Exercise</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="bg-white p-4">
    <div class="container">
      <h2 class="mb-4 text-dark fw-semibold">Cards Columns</h2>

      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="custom-card card-blue">
            <img
              src="https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&q=80&w=600"
              alt="White SUV"
            />
            <p class="card-caption">Some text inside the first card</p>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="custom-card card-yellow">
            <img
              src="https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&q=80&w=600"
              alt="White SUV"
            />
            <p class="card-caption">Some text inside the first card</p>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="custom-card card-red">
            <img
              src="https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&q=80&w=600"
              alt="White SUV"
            />
            <p class="card-caption">Some text inside the first card</p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
