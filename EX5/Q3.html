<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Bootstrap Grid with Nav</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Q3.css" />
  </head>
  <body>
    <div class="header-bg">
      <div class="container">
        <h1 class="display-5 fw-semibold ps-4">Let's test the grid!</h1>
      </div>
    </div>

    <div class="container mb-4">
      <ul class="nav">
        <li class="nav-item">
          <a class="nav-link active px-3" aria-current="page" href="#"
            >Active</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link disabled px-3"
            href="#"
            tabindex="-1"
            aria-disabled="true"
            >Disabled</a
          >
        </li>
      </ul>
    </div>

    <div class="container my-5">
      <div class="grid-container">
        <div class="row g-0">
          <div class="col-6 custom-col">First col</div>
          <div class="col-6 custom-col">Second col</div>
        </div>

        <div class="row g-0">
          <div class="col-4 custom-col">col</div>
          <div class="col-4 custom-col">col</div>
          <div class="col-4 custom-col">col</div>
        </div>

        <div class="row g-0">
          <div class="col-3 custom-col">col</div>
          <div class="col-3 custom-col">col</div>
          <div class="col-3 custom-col">col</div>
          <div class="col-3 custom-col">col</div>
        </div>
      </div>
    </div>

    <div class="footer-bg text-center">
      <h2 class="m-0 fs-3">Created by ABC!</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
