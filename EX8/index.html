<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form đặt vé máy bay</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="bg-light">
    <div class="container">
      <div class="form-container shadow-sm position-relative">
        <div
          class="alert custom-alert alert-dismissible fade show m-0 py-2"
          role="alert"
        >
          <button
            type="button"
            class="btn-close p-2"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>

        <div class="p-4">
          <h1 class="h2 mb-4 fw-normal text-dark">Form đặt vé máy bay</h1>

          <form>
            <div class="mb-3">
              <label for="fullName" class="form-label">Họ tên</label>
              <div class="input-group">
                <span class="input-group-text px-3 bg-light">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-person text-muted"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"
                    />
                  </svg>
                </span>
                <input
                  type="text"
                  id="fullName"
                  class="form-control"
                  placeholder="Họ tên"
                />
                <span class="input-group-text bg-light text-muted fw-light"
                  >vnd</span
                >
              </div>
              <div class="help-text">Phải nhập 5 ký tự, in hoa...</div>
            </div>

            <div class="mb-3">
              <label for="address" class="form-label">Địa chỉ</label>
              <input type="text" id="address" class="form-control" />
              <div class="help-text">Phải nhập 5 ký tự, in hoa...</div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-6">
                <label for="departure" class="form-label">Đi từ</label>
                <select id="departure" class="form-select">
                  <option selected>Hà Nội</option>
                  <option>Hồ Chí Minh</option>
                  <option>Đà Nẵng</option>
                </select>
              </div>
              <div class="col-6">
                <label for="destination" class="form-label">Đến</label>
                <select id="destination" class="form-select">
                  <option selected>Hà Nội</option>
                  <option>Hồ Chí Minh</option>
                  <option>Đà Nẵng</option>
                </select>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label d-block">Chọn chiều đi (Khứ hồi)</label>
              <div class="form-check mb-1">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="directionGo"
                />
                <label
                  class="form-check-label text-muted"
                  d-block
                  for="directionGo"
                  >Đi</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="directionReturn"
                />
                <label class="form-check-label text-muted" for="directionReturn"
                  >Về</label
                >
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-submit w-100 text-center"
            >
              Đặt vé
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
